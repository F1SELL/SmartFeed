name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module files are clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run CI checks
        run: make ci

